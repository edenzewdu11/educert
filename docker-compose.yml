services:
  db:
    image: postgres:16-alpine
    container_name: educerts-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: educerts
      POSTGRES_PASSWORD: educerts
      POSTGRES_DB: educerts
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not exposed on the host to avoid clashing with a local Postgres.
    # The backend connects internally via the "db" service name.
    # To inspect the DB from your host, uncomment and use a free port:
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educerts -d educerts"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./educerts/backend
    container_name: educerts-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://educerts:educerts@db:5432/educerts
      SECRET_KEY: change-me-local-dev-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # Keep 'development' for local HTTP so auth cookies work (Secure cookies
      # require HTTPS). Use 'production' only behind HTTPS.
      ENVIRONMENT: development
      # Frontend URL must match the host-exposed port below.
      FRONTEND_URL: http://localhost:3003
    ports:
      # Host port 8000 is already used by another container.
      - "8001:8000"

  frontend:
    build:
      context: ./educerts/frontend
      args:
        # Baked into the client bundle at build time. Must be the URL the
        # browser uses to reach the backend (host-exposed port).
        NEXT_PUBLIC_API_URL: http://localhost:8001
    container_name: educerts-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Host port 3000 is already used by other containers.
      - "3003:3000"

volumes:
  pgdata:
